<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>¿Quieres ser mi novia? ❤️</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    overflow:hidden;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    font-family:Arial,sans-serif;
    background:#000;
    position:relative;
}

/* Nebulosas */
.nebula{
    position:absolute;
    border-radius:50%;
    filter:blur(80px);
}

.n1{
    width:500px;
    height:500px;
    background:rgba(120,0,255,.25);
    top:-150px;
    left:-150px;
}

.n2{
    width:600px;
    height:600px;
    background:rgba(0,150,255,.20);
    bottom:-250px;
    right:-150px;
}

.n3{
    width:400px;
    height:400px;
    background:rgba(255,0,180,.15);
    top:40%;
    left:40%;
}

/* Planeta */
.planet{
    position:absolute;
    width:180px;
    height:180px;
    border-radius:50%;
    right:8%;
    top:10%;
    background:
    radial-gradient(circle at 30% 30%,
    #d7e6ff,
    #7d9fff,
    #3040a0,
    #111);
    box-shadow:
    0 0 40px #6fa8ff,
    0 0 100px #6fa8ff;
}

/* Estrellas */
.star{
    position:absolute;
    background:white;
    border-radius:50%;
    animation:twinkle infinite;
}

@keyframes twinkle{
    0%,100%{opacity:.2;}
    50%{opacity:1;}
}

/* Estrellas fugaces */
.shooting{
    position:absolute;
    width:150px;
    height:2px;
    background:linear-gradient(to right,white,transparent);
    transform:rotate(-35deg);
    animation:shoot 3s linear infinite;
}

@keyframes shoot{
    0%{
        top:-100px;
        left:-200px;
        opacity:0;
    }

    10%{
        opacity:1;
    }

    100%{
        top:100%;
        left:120%;
        opacity:0;
    }
}

/* Texto */
h1{
    color:white;
    text-align:center;
    z-index:10;
    text-shadow:
    0 0 15px white,
    0 0 30px pink;
}

.botones{
    margin-top:20px;
    z-index:10;
}

button{
    padding:15px 35px;
    font-size:22px;
    border:none;
    border-radius:15px;
    cursor:pointer;
    margin:10px;
    transition:.3s;
}

#si{
    background:#00c853;
    color:white;
    box-shadow:0 0 20px #00ff88;
}

#si:hover{
    transform:scale(1.1);
}

#no{
    position:absolute;
    background:#ff1744;
    color:white;
    box-shadow:0 0 20px #ff1744;
}

/* Corazones */
.heart{
    position:absolute;
    font-size:30px;
    animation:floatUp linear forwards;
    filter:
    drop-shadow(0 0 8px #ff69b4)
    drop-shadow(0 0 15px #ff1493);
}

@keyframes floatUp{
    from{
        transform:
        translateY(0)
        scale(.7)
        rotate(0deg);
        opacity:1;
    }

    to{
        transform:
        translateY(-120vh)
        scale(1.4)
        rotate(360deg);
        opacity:0;
    }
}
</style>
</head>
<audio id="musica" loop>
    <source src="musica.mp3" type="audio/mpeg">
</audio>
<body>

<div class="nebula n1"></div>
<div class="nebula n2"></div>
<div class="nebula n3"></div>

<div class="planet"></div>

<div class="shooting"></div>

<h1>¿Quieres ser mi novia? ❤️</h1>

<div class="botones">
    <button id="si">Sí</button>
    <button id="no">No</button>
</div>

<script>
document.addEventListener("click", () => {
    document.getElementById("musica").play();
}, { once: true });
/* Crear estrellas */
for(let i=0;i<300;i++){

    let s=document.createElement("div");

    s.className="star";

    let size=Math.random()*3+1;

    s.style.width=size+"px";
    s.style.height=size+"px";

    s.style.left=Math.random()*100+"vw";
    s.style.top=Math.random()*100+"vh";

    s.style.animationDuration=
    (Math.random()*3+1)+"s";

    document.body.appendChild(s);
}

/* Corazones flotando */
function crearCorazon(){

    let h=document.createElement("div");

    h.className="heart";

    h.innerHTML="❤️";

    h.style.left=Math.random()*100+"vw";
    h.style.top="100vh";

    h.style.animationDuration=
    (Math.random()*5+5)+"s";

    document.body.appendChild(h);

    setTimeout(()=>{
        h.remove();
    },10000);
}

setInterval(crearCorazon,350);

/* Botón NO */
const no=document.getElementById("no");

no.addEventListener("mouseover",()=>{

    let x=Math.random()*
    (window.innerWidth-150);

    let y=Math.random()*
    (window.innerHeight-100);

    no.style.left=x+"px";
    no.style.top=y+"px";
});

/* Botón SI */
document.getElementById("si")
.addEventListener("click",()=>{

document.body.innerHTML=`
<div style="
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
background:
radial-gradient(circle,#1a0033,#000);
color:white;
text-align:center;
">

<h1 style="
font-size:70px;
text-shadow:
0 0 20px pink,
0 0 40px pink;
">
❤️ Sabía que dirías que sí ❤️
</h1>

<h2 style="
margin-top:20px;
font-size:30px;">
✨ Me haces muy feliz ✨
</h2>

</div>
`;
});
</script>

</body>
<audio id="musica" controls loop>
    <source src="musica.mpeg" type="audio/mpeg">
</audio>
</html>
